name: Build and Push Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "**.txt"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "**.txt"
  schedule:
    - cron: "05 10 * * *"
  workflow_dispatch:

env:
  IMAGE_NAME: bazzite-cps-kde
  IMAGE_REGISTRY: ghcr.io/caiopriorisantos

jobs:
  build-and-push:
    name: Build (${{ matrix.kernel_flavor }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        kernel_flavor:
          - bazzite
          - cachyos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Warsaw .deb
        run: |
          bash build_files/fetch_warsaw.sh

      - name: Validate build.sh syntax
        run: bash -n build_files/build.sh

      - name: Maximize build space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest-${{ matrix.kernel_flavor }}
            type=raw,value=latest,enable=${{ matrix.kernel_flavor == 'bazzite' }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            KERNEL_FLAVOR=${{ matrix.kernel_flavor }}

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes --key env://COSIGN_KEY \
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        env:
          COSIGN_KEY: ${{ secrets.SIGNING_SECRET }}
