name: Build and Push Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "**.txt"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "**.txt"
  schedule:
    - cron: "05 10 * * *"
  workflow_dispatch:

env:
  IMAGE_NAME: bazzite-cps-kde
  IMAGE_REGISTRY: ghcr.io/caiopriorisantos

jobs:
  build-and-push:
    name: Build (${{ matrix.kernel_flavor }})
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        kernel_flavor:
          - bazzite
          - cachyos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate build.sh syntax
        run: bash -n build_files/build.sh

      - name: Generate tags
        id: generate-tags
        shell: bash
        run: |
          TAGS="latest-${{ matrix.kernel_flavor }}"
          if [[ "${{ matrix.kernel_flavor }}" == "bazzite" ]]; then
            TAGS="$TAGS latest"
          fi
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build image
        id: build_image
        uses: redhat-actions/buildah-build@v2
        with:
          context: .
          containerfiles: |
            ./Containerfile
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.generate-tags.outputs.tags }}
          build-args: |
            KERNEL_FLAVOR=${{ matrix.kernel_flavor }}
          oci: true

      - name: Push to GHCR
        id: push
        if: github.event_name != 'pull_request'
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build_image.outputs.image }}
          tags: ${{ steps.build_image.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Login cosign to GHCR
        if: github.event_name != 'pull_request'
        run: cosign login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

      - name: Sign image
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes --key env://COSIGN_KEY \
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        env:
          COSIGN_KEY: ${{ secrets.SIGNING_SECRET }}
